# Librora — Local Development Services
# PostgreSQL is on Supabase — not here.
# Only Redis (queue) runs locally. Vector search uses PostgreSQL/pgvector.

services:
  redis:
    image: redis:7-alpine
    container_name: librora_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
