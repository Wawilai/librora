# Librora — Local Development Services
# PostgreSQL is on Supabase — not here.
# Only Redis (queue) and Qdrant (vector search) run locally.

services:
  redis:
    image: redis:7-alpine
    container_name: librora_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: librora_qdrant
    ports:
      - "6333:6333"   # HTTP API + Web UI
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

volumes:
  redis_data:
  qdrant_data:
