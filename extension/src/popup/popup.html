<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Librora - Library Clipper</title>
    <style>
      :root {
        --primary: #3942a4;
        --primary-hover: #303890;
        --foreground: #141427;
        --muted: #667085;
        --muted-2: #8a90a3;
        --border: #dedee7;
        --border-strong: #d0d1dc;
        --card: #ffffff;
        --background: #f7f6f2;
        --success: #17734f;
        --error: #b42318;
        --shadow: 0 14px 40px rgba(15, 23, 42, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        width: 374px;
        overflow: hidden;
        background: var(--background);
        font-family:
          Inter,
          "Segoe UI",
          -apple-system,
          BlinkMacSystemFont,
          Roboto,
          sans-serif;
        color: var(--foreground);
      }

      .shell {
        background: var(--card);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 40px;
        padding: 0 14px;
        border-bottom: 1px solid var(--border);
      }

      .brand {
        display: flex;
        align-items: center;
        min-width: 0;
        gap: 8px;
        color: #4b5370;
        font-size: 13px;
        font-weight: 500;
      }

      .brand-icon,
      .top-icon,
      .secondary-button {
        display: grid;
        place-items: center;
        color: #5e667d;
      }

      .brand-icon,
      .top-icon {
        width: 18px;
        height: 18px;
      }

      .brand-icon svg,
      .top-icon svg,
      .secondary-button svg,
      .save-button svg {
        width: 16px;
        height: 16px;
      }

      .content {
        padding: 17px 13px 13px;
      }

      .eyebrow {
        margin: 0 0 3px;
        color: #505874;
        font-size: 13px;
        line-height: 1.2;
      }

      .title {
        margin: 0;
        max-width: 330px;
        overflow: hidden;
        color: #050510;
        font-size: 16px;
        font-weight: 700;
        line-height: 1.3;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .domain {
        margin: 2px 0 16px;
        max-width: 330px;
        overflow: hidden;
        color: #5f667d;
        font-size: 13px;
        line-height: 1.25;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .note-wrap {
        position: relative;
        display: block;
        margin-bottom: 12px;
      }

      .note-label {
        position: absolute;
        left: 10px;
        top: 9px;
        pointer-events: none;
        color: #58607a;
        font-size: 13px;
        line-height: 1;
      }

      textarea {
        display: block;
        width: 100%;
        height: 63px;
        resize: none;
        border: 1px solid var(--border-strong);
        border-radius: 9px;
        background: #fffdf9;
        color: var(--foreground);
        font: inherit;
        font-size: 13.5px;
        line-height: 1.45;
        outline: none;
        padding: 30px 10px 8px;
        transition:
          border-color 120ms ease,
          box-shadow 120ms ease,
          background 120ms ease;
      }

      textarea::placeholder {
        color: #8c92a5;
        opacity: 0.72;
      }

      textarea:focus {
        border-color: #9ca3cf;
        background: #ffffff;
        box-shadow: 0 0 0 3px rgba(57, 66, 164, 0.1);
      }

      .actions {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 38px;
        gap: 8px;
      }

      button {
        font: inherit;
      }

      .save-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        height: 32px;
        border: 0;
        border-radius: 8px;
        background: var(--primary);
        color: white;
        cursor: pointer;
        font-size: 13px;
        font-weight: 650;
        transition:
          background 120ms ease,
          transform 80ms ease,
          opacity 120ms ease;
      }

      .save-button:hover:not(:disabled) {
        background: var(--primary-hover);
      }

      .save-button:active:not(:disabled) {
        transform: translateY(1px);
      }

      .save-button:disabled {
        cursor: default;
        opacity: 0.58;
      }

      .secondary-button {
        height: 32px;
        border: 1px solid var(--border);
        border-radius: 9px;
        background: #ffffff;
        cursor: pointer;
        transition:
          border-color 120ms ease,
          color 120ms ease,
          background 120ms ease;
      }

      .secondary-button:hover {
        border-color: #b9bdd0;
        background: #fbfbfd;
        color: var(--primary);
      }

      .status {
        margin: 8px 1px 0;
        color: var(--muted-2);
        font-size: 11px;
        line-height: 1.25;
      }

      .status:empty {
        display: none;
      }

      .status.ok {
        color: var(--success);
      }

      .status.error {
        color: var(--error);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9" />
              <path d="M8.2 9.4c1.2-1.4 3.6-1.4 4.8 0 1.2 1.4 3.6 1.4 4.8 0" />
              <path d="M8 12.4c1.2 1.4 3.8 1.4 5 0 1.2-1.4 3.8-1.4 5 0" />
              <path d="M9 15.5c1.6 1.1 4.4 1.1 6 0" />
            </svg>
          </span>
          <span>Library Clipper</span>
        </div>
        <span class="top-icon" id="auth-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="6.5" y="10.5" width="11" height="8" rx="1.8" />
            <path d="M8.5 10.5V8.2a3.5 3.5 0 0 1 7 0v2.3" />
          </svg>
        </span>
      </header>

      <section class="content">
        <p class="eyebrow">Current tab</p>
        <h1 class="title" id="tab-title">Loading current tab...</h1>
        <p class="domain" id="tab-domain"> </p>

        <label class="note-wrap" for="note">
          <span class="note-label">Note (optional)</span>
          <textarea id="note" maxlength="10000" placeholder="เช่น อ่านอีกครั้งก่อน Q3 planning..."></textarea>
        </label>

        <div class="actions">
          <button class="save-button" id="save-btn" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M12 5v14" />
              <path d="M5 12h14" />
            </svg>
            <span id="save-label">Save</span>
          </button>
          <button class="secondary-button" id="open-link" type="button" title="Open Librora" aria-label="Open Librora">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="5" y="5" width="5" height="5" rx="1" />
              <rect x="14" y="5" width="5" height="5" rx="1" />
              <rect x="5" y="14" width="5" height="5" rx="1" />
              <rect x="14" y="14" width="5" height="5" rx="1" />
            </svg>
          </button>
        </div>
        <p class="status" id="status">Checking...</p>
      </section>
    </main>

    <script type="module" src="popup.ts"></script>
  </body>
</html>
